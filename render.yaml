services:
  - type: web
    name: cyber-memory-cemetery
    runtime: python
    plan: free
    buildCommand: python3 -m py_compile server.py cemetery_core.py verification_cache.py verification_trust.py
    startCommand: python3 server.py
    healthCheckPath: /api/status
    envVars:
      - key: HOST
        value: 0.0.0.0
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: GONKA_API_KEY
        sync: false
      - key: GONKA_BASE_URL
        value: https://api.gonkarouter.io/v1
      - key: GONKA_MODEL
        value: auto
      - key: GONKA_ARCHAEOLOGIST_MODEL
        value: MiniMaxAI/MiniMax-M2.7
      - key: GONKA_VERIFIER_MODEL
        value: moonshotai/Kimi-K2.6
      - key: GONKA_MAX_TOKENS
        value: 1024
      - key: PINATA_JWT
        sync: false
